services:
  - type: web
    name: veranomedia-crm-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn backend.app:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: veranomedia-db
          property: connectionString
      - key: CRM_SECRET_KEY
        generateValue: true
      - key: RESEND_API_KEY
        sync: false
      - key: VM_MARIA_SECRET
        sync: false
      - key: RESEND_FROM
        value: hola@veranomedia.digital
      - key: RESEND_TO
        value: espartaco.rd@gmail.com
      - key: CORS_ORIGINS
        value: https://veranomedia.digital

databases:
  - name: veranomedia-db
    databaseName: vm_crm
    plan: free
