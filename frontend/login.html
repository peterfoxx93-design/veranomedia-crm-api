<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VM CRM — Verano Media</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        vm: { 50: '#eff6ff', 100: '#dbeafe', 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8', 900: '#1e3a5f' }
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        * { font-family: 'Inter', sans-serif; }
        body { background: linear-gradient(135deg, #1e3a5f 0%, #2563eb 100%); }
        .login-card { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="login-card w-full max-w-md">
        <!-- Logo -->
        <div class="text-center mb-8">
            <div class="w-16 h-16 bg-white rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg">
                <span class="text-vm-600 font-bold text-3xl">V</span>
            </div>
            <h1 class="text-white text-2xl font-bold">Verano Media</h1>
            <p class="text-blue-200 text-sm mt-1">CRM</p>
        </div>

        <!-- Login Form -->
        <div class="bg-white rounded-2xl shadow-2xl p-8">
            {% if error %}
            <div class="bg-red-50 text-red-600 text-sm p-3 rounded-xl mb-4 text-center">
                {{ error }}
            </div>
            {% endif %}

            <form method="POST" action="/login">
                <div class="mb-5">
                    <label class="block text-sm font-medium text-gray-700 mb-2">Usuario</label>
                    <input type="text" name="username" required
                           class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-vm-500 focus:border-vm-500 outline-none transition"
                           placeholder="Ingresa tu usuario">
                </div>
                <div class="mb-6">
                    <label class="block text-sm font-medium text-gray-700 mb-2">Contraseña</label>
                    <input type="password" name="password" required
                           class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-vm-500 focus:border-vm-500 outline-none transition"
                           placeholder="Ingresa tu contraseña">
                </div>
                <button type="submit"
                        class="w-full bg-vm-600 text-white font-semibold py-3 px-4 rounded-xl hover:bg-vm-700 transition shadow-md">
                    Ingresar
                </button>
            </form>
        </div>

        <p class="text-center text-blue-300 text-xs mt-6">Verano Media RD &copy; 2026</p>
    </div>
</body>
</html>
